<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIPLOCK — Soccer Grip Socks</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">GRIPLOCK</a>
    <div class="nav-links">
      <a href="#product">Shop</a>
      <a href="sizeguide.html">Size Guide</a>
      <a href="faq.html">FAQ</a>
    </div>

    <button class="cart-btn" id="cartBtn">
      🛒 <span id="cartCount">0</span>
    </button>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <p class="hero-eyebrow">ENGINEERED FOR PERFORMANCE</p>
      <h1 class="hero-headline">DON’T SLIP.<br>DOMINATE.</h1>
      <p class="hero-sub">
        Pro-grade grip socks built for control, speed, and stability.
      </p>
      <a href="#product" class="btn-primary">SHOP NOW</a>
    </div>
  </section>

  <!-- PRODUCT -->
  <section class="product-section" id="product">

    <div class="product-container">

      <!-- IMAGE CAROUSEL -->
      <div class="product-visual">

        <div class="sock-preview-carousel">

          <div class="carousel-slide active">
            <img src="https://i.imgur.com/v76KsnC.png" alt="Grip Socks 1">
          </div>

          <div class="carousel-slide">
            <img src="https://i.imgur.com/c6nucJv.png" alt="Grip Socks 2">
          </div>

          <div class="carousel-slide">
            <img src="https://i.imgur.com/6OFv0OB.png" alt="Grip Socks 3">
          </div>

          <button class="carousel-btn prev" id="prevSlide">‹</button>
          <button class="carousel-btn next" id="nextSlide">›</button>

        </div>

        <div class="product-badge">GRIPLOCK PRO</div>

      </div>

      <!-- PRODUCT INFO -->
      <div class="product-info">

        <h2>Grip Socks</h2>

        <div class="product-price">£18.99</div>

        <!-- SIZE -->
        <div class="selector-group">
          <label>Size</label>
          <div class="size-options">
            <button class="size-btn" data-size="S">S</button>
            <button class="size-btn" data-size="M">M</button>
            <button class="size-btn selected" data-size="L">L</button>
            <button class="size-btn" data-size="XL">XL</button>
          </div>
        </div>

        <!-- COLOR -->
        <div class="selector-group">
          <label>Color</label>
          <div class="color-swatches">
            <button class="swatch active" data-color="black"></button>
            <button class="swatch" data-color="white"></button>
            <button class="swatch" data-color="red"></button>
            <button class="swatch" data-color="navy"></button>
            <button class="swatch" data-color="green"></button>
          </div>
          <p id="selectedColorLabel">Black</p>
        </div>

        <!-- QTY -->
        <div class="selector-group">
          <label>Quantity</label>
          <div class="qty-control">
            <button id="qtyMinus">-</button>
            <span id="qtyValue">1</span>
            <button id="qtyPlus">+</button>
          </div>
        </div>

        <!-- BUTTONS -->
        <button id="addToCartBtn" class="btn-primary">ADD TO CART</button>
        <button id="buyNowBtn" class="btn-secondary">BUY NOW</button>

      </div>
    </div>
  </section>

  <script src="js/cart.js"></script>
  <script src="js/product.js"></script>

</body>
</html>
