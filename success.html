<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — GRIPLOCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .success-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 32px;
    }
    .success-card {
      max-width: 480px; text-align: center;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 56px 40px;
    }
    .success-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 28px;
    }
    .success-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px; letter-spacing: 2px; color: var(--white);
      line-height: 1; margin-bottom: 16px;
    }
    .success-sub { color: #888; font-size: 15px; line-height: 1.7; margin-bottom: 32px; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">GRIPLOCK</a>
  </nav>

  <div class="success-page">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h1 class="success-title">ORDER CONFIRMED</h1>
      <p class="success-sub">
        Your GRIPLOCK PRO socks are on their way. Check your email for your tracking number — usually sent within 24 hours.
      </p>
      <a href="index.html" class="btn-primary">BACK TO SHOP</a>
    </div>
  </div>

  <script>
    // Clear cart on successful payment
    localStorage.removeItem('griplock_cart');
  </script>
</body>
</html>
